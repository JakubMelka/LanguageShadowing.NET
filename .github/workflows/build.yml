name: build

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_PATH: src/LanguageShadowing.App/LanguageShadowing.App.csproj
  BUILD_CONFIGURATION: Release
  TARGET_FRAMEWORK: net9.0-windows10.0.19041.0
  RUNTIME_IDENTIFIER: win-x64

jobs:
  build-windows:
    name: build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install .NET MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Restore dependencies
        run: >
          dotnet restore ${{ env.PROJECT_PATH }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --framework ${{ env.TARGET_FRAMEWORK }}
          --runtime ${{ env.RUNTIME_IDENTIFIER }}

      - name: Build Windows app
        run: >
          dotnet build ${{ env.PROJECT_PATH }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --framework ${{ env.TARGET_FRAMEWORK }}
          --runtime ${{ env.RUNTIME_IDENTIFIER }}
          --no-restore
          -p:ContinuousIntegrationBuild=true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: language-shadowing-build
          path: build/LanguageShadowing.App/**
          if-no-files-found: error
