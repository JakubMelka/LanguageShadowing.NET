name: publish

on:
  workflow_dispatch:

env:
  PROJECT_PATH: src/LanguageShadowing.App/LanguageShadowing.App.csproj
  BUILD_CONFIGURATION: Release
  TARGET_FRAMEWORK: net9.0-windows10.0.19041.0
  RUNTIME_IDENTIFIER: win-x64
  PUBLISH_READY_TO_RUN: true

jobs:
  publish-msix:
    name: publish
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install .NET MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Restore dependencies
        run: >
          dotnet restore ${{ env.PROJECT_PATH }}
          --runtime ${{ env.RUNTIME_IDENTIFIER }}
          -p:PublishReadyToRun=${{ env.PUBLISH_READY_TO_RUN }}
          -p:WindowsPackageType=MSIX
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false

      - name: Publish unsigned MSIX package
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration ${{ env.BUILD_CONFIGURATION }}
          --framework ${{ env.TARGET_FRAMEWORK }}
          --runtime ${{ env.RUNTIME_IDENTIFIER }}
          --no-restore
          -p:WindowsPackageType=MSIX
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false
          -p:AppxPackageDir=${{ github.workspace }}\artifacts\msix\
          -p:PublishReadyToRun=${{ env.PUBLISH_READY_TO_RUN }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: language-shadowing-msix
          path: artifacts/msix/**
          if-no-files-found: error
